<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#d9c3a9">
<title>anomaly.fm</title>
<meta name="description" content="A retro AM radio you tune across live stations — music through the static, and real-time signals from the world.">
<meta property="og:type" content="website">
<meta property="og:title" content="anomaly.fm">
<meta property="og:description" content="Tune a retro AM radio across live music and real-time signals from the world.">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

<!-- Apply the saved theme before first paint to avoid a flash of the default palette. -->
<script>
  try {
    var saved = localStorage.getItem('anomalyfm-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  } catch (e) { /* storage blocked — fall back to the default theme */ }
</script>

<style>
  /*
   * Semantic palette tokens. Each token names a role (a surface, the text on
   * it, the accent), never a literal colour — so a new theme is just an
   * override block, not a rewrite. The default :root is the "cream" theme and
   * is intentionally identical to the original anomaly.fm palette.
   */
  :root {
    --page:        #d9c3a9;   /* page background            */
    --surface:     #efe0cc;   /* radio body                 */
    --surface-ink: #17140f;   /* text sitting on the body   */
    --well:        #17140f;   /* recessed parts: card, dial, slider thumb */
    --well-ink:    #efe0cc;   /* text sitting in a well     */
    --muted:       #b39d80;   /* secondary text             */
    --accent:      #57b7b0;   /* the teal signal colour     */
    --accent-deep: #3e968f;   /* pressed / focus / live     */
    --track:       #2a241c;   /* slider track, idle live dot*/
    --signal:      #8a7458;   /* the fine signal read-out   */
    --shadow:      rgba(37, 26, 14, .35);
    --edge:        transparent;
    color-scheme: light;
  }

  :root[data-theme="black"] {
    --page:        #060608;
    --surface:     #17171b;
    --surface-ink: #e9e7ea;
    --well:        #060607;
    --well-ink:    #f0eee8;
    --muted:       #82808b;
    --accent:      #57b7b0;
    --accent-deep: #3e968f;
    --track:       #2c2c33;
    --signal:      #6d6a77;
    --shadow:      rgba(0, 0, 0, .6);
    --edge:        rgba(255, 255, 255, .06);
    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0; min-height: 100dvh; display: grid; padding: 24px 16px;
    background: var(--page);
    font-family: "Pixelify Sans", ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--surface-ink);
    -webkit-font-smoothing: none;
    transition: background .35s ease;
  }

  .device {
    margin: auto; width: min(92vw, 340px);
    background: var(--surface); border-radius: 34px; padding: 14px 16px 16px;
    box-shadow: 0 24px 60px var(--shadow), inset 0 0 0 1px var(--edge);
    transition: background .35s ease, box-shadow .35s ease;
  }
  .grille {
    height: 68px; border-radius: 22px 22px 10px 10px;
    background-color: var(--accent);
    background-image: radial-gradient(circle, rgba(15, 12, 8, .62) 2.1px, transparent 2.7px);
    background-size: 10px 10px; background-position: center;
  }
  .card {
    position: relative; overflow: hidden;
    background: var(--well); color: var(--well-ink);
    border-radius: 16px; margin-top: 12px; padding: 12px 14px 10px;
    box-shadow: 0 5px 12px rgba(23, 20, 15, .22);
  }
  .card::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background-image: radial-gradient(circle, rgba(255, 255, 255, .55) .5px, transparent 1.2px);
    background-size: 3px 3px;
  }
  .card.retuning::after { animation: retune .5s steps(1); }
  @keyframes retune { 0%, 100% { opacity: 0; } 20% { opacity: .5; } 40% { opacity: .15; } 60% { opacity: .55; } 80% { opacity: .2; } }
  .card .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .card .title { font-size: 1.02rem; font-weight: 700; letter-spacing: .04em; margin-bottom: 6px; }
  .card .title .glyph { color: var(--accent); margin-right: .35em; }
  .card .title .glyph::before { content: "\25B6"; }
  html.radio-on .card .title .glyph::before { content: "\25A0"; }
  .card .mid { font-size: .8rem; }
  .card .mid .left { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  html.radio-live .card .mid .left { color: var(--accent); }
  .card .sub { font-size: .68rem; color: var(--muted); margin-top: 3px; }

  .dial-wrap { display: grid; place-items: center; padding: 10px 0 2px; }
  [data-radio="toggle"] {
    position: relative; width: 184px; aspect-ratio: 1; border: 0; padding: 0;
    border-radius: 50%; cursor: pointer; background: var(--well);
    box-shadow: 0 10px 22px rgba(23, 20, 15, .32); font: inherit;
  }
  [data-radio="toggle"]:focus-visible { outline: 4px solid var(--accent-deep); outline-offset: 5px; }
  .num {
    position: absolute; left: 50%; top: 50%;
    color: var(--well-ink); font-size: .66rem; letter-spacing: .05em; opacity: .92;
  }
  .knob {
    position: absolute; inset: 36px; border-radius: 50%;
    background: var(--accent);
    box-shadow: inset 0 -6px 0 rgba(23, 20, 15, .14);
    transform: rotate(-32deg);
    transition: transform .65s cubic-bezier(.34, 1.56, .64, 1);
  }
  .knob .dot {
    position: absolute; top: 16px; left: 50%; margin-left: -9px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent-deep);
  }
  html.radio-receiving .knob { transform: rotate(142deg); }
  html.radio-tuning .knob { animation: seek 1.15s ease-in-out infinite alternate; }
  @keyframes seek { from { transform: rotate(136deg); } to { transform: rotate(150deg); } }
  [data-radio="toggle"]:active .knob { scale: .975; }

  .volume { padding: 12px 22px 2px; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 30px;
    background: transparent; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track { height: 3px; border-radius: 2px; background: var(--track); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 30px; border-radius: 7px;
    background: var(--well); margin-top: -13.5px;
  }
  input[type="range"]::-moz-range-track { height: 3px; border-radius: 2px; background: var(--track); }
  input[type="range"]::-moz-range-thumb { width: 20px; height: 30px; border-radius: 7px; border: 0; background: var(--well); }
  input[type="range"]:focus-visible { outline: 3px solid var(--accent-deep); outline-offset: 2px; border-radius: 8px; }

  .foot {
    display: flex; align-items: center; justify-content: center; gap: .55em;
    font-size: .72rem; letter-spacing: .06em; margin-top: 10px; min-height: 1.2em;
  }
  .foot .livedot { width: 12px; height: 12px; border-radius: 50%; background: var(--track); }
  html.radio-live .foot .livedot { background: var(--accent-deep); animation: blink 1.7s infinite; }
  .signal-line { text-align: center; font-size: .62rem; color: var(--signal); letter-spacing: .12em; margin-top: 5px; min-height: 1em; }
  @keyframes blink { 50% { opacity: .3; } }

  /* Frequency band — the tuning scale, a moving needle, and a stop per station. */
  .tuner {
    position: relative; height: 60px; margin-top: 10px;
    border-radius: 12px; background: var(--well);
    box-shadow: inset 0 2px 7px rgba(0, 0, 0, .4);
    outline: none;
  }
  .tuner__scale {
    position: absolute; left: 14px; right: 14px; top: 16px; height: 10px;
    color: var(--well-ink); opacity: .22;
    background-image: repeating-linear-gradient(90deg, currentColor 0 1px, transparent 1px 12px);
  }
  .tuner__needle {
    position: absolute; top: 8px; width: 2px; height: 24px;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    transform: translateX(-50%);
    transition: left .5s cubic-bezier(.34, 1.4, .5, 1);
  }
  .tuner__needle::after {
    content: ""; position: absolute; top: -4px; left: -3px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }
  .station {
    position: absolute; top: 28px; transform: translateX(-50%);
    background: transparent; border: 0; padding: 4px 6px; cursor: pointer;
    color: var(--well-ink); font: inherit; font-size: .74rem; letter-spacing: .03em;
    opacity: .5; transition: opacity .2s, color .2s;
  }
  .station::before {
    content: ""; display: block; width: 2px; height: 9px; margin: 0 auto 4px;
    background: currentColor; opacity: .6;
  }
  .station:hover { opacity: .85; }
  .station[aria-checked="true"] { opacity: 1; color: var(--accent); }
  .station:focus-visible { outline: 2px solid var(--accent-deep); outline-offset: 2px; border-radius: 6px; }

  /* Band selector — MUSIC (recorded) vs SIGNAL (live, sonified) stations. */
  .banks { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
  .bank {
    font: inherit; font-size: .58rem; letter-spacing: .14em;
    color: var(--muted); background: transparent;
    border: 1px solid var(--muted); border-radius: 999px;
    padding: 4px 11px; cursor: pointer;
    transition: color .2s ease, background .2s ease, border-color .2s ease;
  }
  .bank:hover { color: var(--surface-ink); }
  .bank[aria-selected="true"] { color: var(--well); background: var(--accent); border-color: var(--accent); }
  .bank:focus-visible { outline: 2px solid var(--accent-deep); outline-offset: 2px; }

  /* Theme switcher — a fixed corner control; each swatch previews its body + accent. */
  .themes {
    position: fixed; top: 14px; right: 14px; z-index: 10;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 9px; border-radius: 999px;
    background: var(--surface);
    box-shadow: 0 6px 18px var(--shadow), inset 0 0 0 1px var(--edge);
    transition: background .35s ease;
  }
  .swatch {
    position: relative; width: 26px; height: 26px; padding: 0;
    border: 2px solid transparent; border-radius: 8px; cursor: pointer;
    background: var(--sw);
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .25);
    transition: border-color .2s ease, transform .1s ease;
  }
  .swatch::after {
    content: ""; position: absolute; right: 3px; bottom: 3px;
    width: 9px; height: 9px; border-radius: 2px; background: var(--sw-accent);
  }
  .swatch:hover { transform: translateY(-1px); }
  .swatch[aria-pressed="true"] { border-color: var(--accent); }
  .swatch:focus-visible { outline: 3px solid var(--accent-deep); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    body, .device { transition: none; }
    .knob { transition: none; }
    .tuner__needle { transition: none; }
    .card.retuning::after { animation: none; }
    html.radio-tuning .knob { animation: none; }
    html.radio-live .foot .livedot { animation: none; }
  }
</style>
</head>
<body>
<nav class="themes" aria-label="Theme">
  <button class="swatch" type="button" data-set-theme="cream"
          style="--sw: #efe0cc; --sw-accent: #57b7b0" aria-pressed="true" aria-label="Cream theme"></button>
  <button class="swatch" type="button" data-set-theme="black"
          style="--sw: #17171b; --sw-accent: #57b7b0" aria-pressed="false" aria-label="Black theme"></button>
</nav>

<main class="device">
    <div class="grille" aria-hidden="true"></div>

    <section class="card">
      <div class="title"><span class="glyph" aria-hidden="true"></span>ANOMALY.FM</div>
      <div class="row mid">
        <span class="left" data-radio="status">tuning&hellip;</span>
      </div>
      <div class="row sub">
        <span class="left">transmitting from the anomaly</span>
        <span class="right">610 kHz AM</span>
      </div>
    </section>

    <div class="banks" role="tablist" aria-label="Band">
      <button class="bank" type="button" data-bank="music" role="tab" aria-selected="true">MUSIC</button>
      <button class="bank" type="button" data-bank="signal" role="tab" aria-selected="false">SIGNAL</button>
    </div>

    <div class="tuner" role="radiogroup" aria-label="Frequency" tabindex="-1">
      <div class="tuner__scale" aria-hidden="true"></div>
      <div class="tuner__needle" aria-hidden="true"></div>
    </div>

    <div class="dial-wrap">
      <button data-radio="toggle" aria-label="Tune in or out">
        <span class="knob" aria-hidden="true"><span class="dot"></span></span>
      </button>
    </div>

    <div class="volume">
      <input type="range" data-radio="volume" min="0" max="100" value="80" aria-label="Volume">
    </div>

    <div class="foot">
      <span class="livedot" aria-hidden="true"></span>
      <span><span data-radio="listeners">&ndash;</span> <span data-radio="listeners-label">RECEIVERS TUNED IN</span></span>
    </div>
    <div class="signal-line" data-radio="signal">&nbsp;</div>
  </main>

<script>
  // Skin-only decoration: the tangential AM dial numbers.
  const dial = document.querySelector('[data-radio="toggle"]');
  [54, 60, 70, 80, 100, 120, 140, 160].forEach((n, i, arr) => {
    const angle = -132 + (264 / (arr.length - 1)) * i;
    const span = document.createElement('span');
    span.className = 'num';
    span.textContent = n;
    span.style.transform = 'translate(-50%, -50%) rotate(' + angle + 'deg) translateY(-78px)';
    dial.appendChild(span);
  });
</script>

<script>
  // Theme switcher: applies a palette, syncs the browser chrome colour, and
  // remembers the choice. The head script has already applied any saved theme.
  (() => {
    const root = document.documentElement;
    const metaColor = document.querySelector('meta[name="theme-color"]');
    const swatches = document.querySelectorAll('.swatch');
    const CHROME = { cream: '#d9c3a9', black: '#060608' };

    const apply = (name) => {
      root.setAttribute('data-theme', name);
      if (metaColor && CHROME[name]) metaColor.setAttribute('content', CHROME[name]);
      swatches.forEach((b) => b.setAttribute('aria-pressed', String(b.dataset.setTheme === name)));
    };

    let saved = null;
    try { saved = localStorage.getItem('anomalyfm-theme'); } catch (e) { /* storage blocked */ }
    apply(saved || 'cream');

    swatches.forEach((b) => b.addEventListener('click', () => {
      apply(b.dataset.setTheme);
      try { localStorage.setItem('anomalyfm-theme', b.dataset.setTheme); } catch (e) { /* storage blocked */ }
    }));
  })();
</script>

<!-- Player runtime: our multi-channel controller (supersedes radio-core.js). -->
<script src="station/player.js"></script>
</body>
</html>
